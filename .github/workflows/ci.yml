name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool libtool-bin libcurl4-openssl-dev libpcap-dev libunwind-dev libgoogle-perftools-dev
      - name: build sipp
        run: |
          sudo chmod a+w /usr/local/src/
          cd /usr/local/src/
          git clone https://github.com/SIPp/sipp.git -b v3.6.1 --depth 20
          cd sipp
          ./build.sh --common
          sudo make install
      - name: build drachtio
        run: |
          ./autogen.sh
          mkdir -p build && cd $_
          ../configure --enable-tcmalloc=yes
          make
          sudo make install
      - name: install nodejs
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: run ci tests
        run: |
          cd test
          npm install
          npm run test-ci
      - name: dump drachtio log
        if: always()
        run: |
          if [ -f /tmp/drachtio.log ]; then cat /tmp/drachtio.log; fi
      - name: upload per-fixture drachtio logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: drachtio-fixture-logs
          path: /tmp/drachtio-fixture-*.log
          if-no-files-found: ignore
          retention-days: 7