name: Clang Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *' # Daily at 10:00 UTC

jobs:
  clang-analyzer:
    name: Clang static analysis
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v7
         with:
          submodules: recursive
       - run: |
          sudo apt-get update
          sudo apt-get install -y libtool libtool-bin libcurl4-openssl-dev libpcap-dev libunwind-dev libgoogle-perftools-dev clang-tools
       - run: |
          ./autogen.sh
          mkdir -p build && cd $_
          scan-build ../configure
          # Run the analyzer for reporting only. --status-bugs is intentionally
          # omitted: it makes scan-build exit non-zero on any finding, and the
          # bulk of findings are in the vendored deps (sofia-sip, jansson,
          # hiredis) which we don't control, so it can never pass.
          scan-build make